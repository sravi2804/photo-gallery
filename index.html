<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Responsive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📸 My Responsive Photo Gallery</h1>
        <p>Beautiful images with hover effects and dark mode</p>
        <div class="controls">
            <button id="themeToggle">🌙 Dark Mode</button>
            <button id="filterFavBtn">⭐ Show Favorites Only</button>
            <button id="showAllBtn">🖼️ Show All Photos</button>
        </div>
    </header>

    <main>
        <div class="gallery" id="galleryContainer">
            <p style="text-align: center;">Loading beautiful photos...</p>
        </div>
    </main>

    <footer>
        <p>✨ Built with CSS Grid | Responsive Design | JavaScript Dynamic Content ✨</p>
        <p>Hover over images to see the effect! | Click buttons to filter favorites</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
